name: Build aTox with tox4j

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout aTox
        uses: actions/checkout@v4
        with:
          path: atox
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools ndk;26.1.10909125'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libsodium-dev

      # ✅ Исправленная установка SBT через Coursier
      - name: Install SBT via Coursier
        run: |
          curl -fL https://github.com/coursier/launchers/raw/master/cs-x86_64-pc-linux.gz | gzip -d > cs
          chmod +x cs
          ./cs install sbt scala
          echo "$HOME/.local/share/coursier/bin" >> $GITHUB_PATH
          sbt --version

      - name: Build and publish tox4j
        run: |
          cd ~
          git clone --depth 1 --branch 0.2.20 https://github.com/TokTok/tox4j.git
          cd tox4j
          
          ./scripts/build-host -j4
          ./scripts/build-aarch64-linux-android -j4 release
          ./scripts/build-armv7a-linux-androideabi -j4 release
          ./scripts/build-x86_64-linux-android -j4 release
          
          sbt publishLocal
          
          mkdir -p ~/.m2-cache
          cp -r ~/.m2/repository/org/toktok ~/.m2-cache/

      - name: Restore local Maven for aTox
        run: |
          mkdir -p ~/.m2/repository/org
          cp -r ~/.m2-cache/toktok ~/.m2/repository/org/

      - name: Build aTox
        run: |
          cd atox
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF
          ./gradlew :atox:assembleDebug :atox:assembleRelease --no-daemon --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: aTox-APKs
          path: |
            atox/atox/build/outputs/apk/debug/*.apk
            atox/atox/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: error
