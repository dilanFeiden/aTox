name: Build aTox

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout aTox
        uses: actions/checkout@v4
        with:
          path: atox
          fetch-depth: 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools ndk;26.1.10909125'

      - name: Install SBT (для совместимости, если нужно)
        uses: sbt/setup-sbt@v1

      # ⚠️ Пропускаем сборку tox4j — используем prebuilt из кеша или скачанный артефакт

      - name: Build aTox
        run: |
          cd atox
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat > gradle.properties << EOF
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF
          ./gradlew :atox:assembleDebug :atox:assembleRelease --no-daemon --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: aTox-APKs
          path: |
            atox/atox/build/outputs/apk/debug/*.apk
            atox/atox/build/outputs/apk/release/*.apk
          retention-days: 7
